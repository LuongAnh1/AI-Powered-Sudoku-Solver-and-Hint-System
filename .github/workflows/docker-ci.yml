name: Build and Push Docker Image to Docker Hub

# Kích hoạt quy trình CI/CD mỗi khi có sự kiện PUSH code lên nhánh main (hoặc master)
on:
  push:
    branches:
      - main  # Thay bằng 'master' nếu nhánh chính của bạn tên là master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Tải mã nguồn từ kho GitHub về máy ảo của GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Thiết lập Docker Buildx (hỗ trợ build đa giai đoạn tối ưu)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 3: Đăng nhập vào Docker Hub sử dụng Secrets an toàn bảo mật
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Tự động Build và Push Image lên Docker Hub của bạn
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            luonganh1/sudoku-solver:v2
            luonganh1/sudoku-solver:latest
          # Sử dụng bộ nhớ đệm (cache) của GitHub để tăng tốc độ biên dịch cho các lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max