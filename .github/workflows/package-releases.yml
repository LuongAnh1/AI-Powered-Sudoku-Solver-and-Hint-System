name: Package and Release Desktop Apps

on:
  push:
    tags:
      - 'v*' # Tự động chạy khi bạn push thẻ phiên bản mới (ví dụ: v1.0.0)
  workflow_dispatch: # Cho phép bạn bấm nút kích hoạt chạy thủ công trên web GitHub

permissions:
  contents: write # Cấp quyền cho GitHub Actions tạo bản Release và tải file lên

jobs:
  build-and-package:
    name: Build and Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # <--- KHÔNG hủy bỏ các hệ điều hành khác nếu 1 cái bị lỗi
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      # 1. Tải mã nguồn về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Thiết lập môi trường Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Cài đặt thư viện hệ thống đồ họa (CHỈ CHẠY TRÊN LINUX) để OpenCV không bị lỗi
      - name: Install System Dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      # 4. Cài đặt các thư viện Python cần thiết
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pybind11

      # 5. Tự động biên dịch lõi C++ (Engine) tương thích với hệ điều hành đang chạy
      - name: Build C++ Engine (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release
          copy Release\sudoku_solver_cpp*.pyd ..\app\
        shell: pwsh

      - name: Build C++ Engine (Unix - Mac & Linux)
        if: matrix.os != 'windows-latest'
        run: |
          # Dùng Python để tự động dọn dẹp cờ liên kết tĩnh - Hoạt động hoàn hảo trên cả Linux và Mac
          python -c "p='CMakeLists.txt'; t=open(p).read().replace('-static-libgcc','').replace('-static-libstdc++','').replace('-static',''); open(p,'w').write(t)"
          mkdir build
          cd build
          cmake ..
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cp sudoku_solver_cpp*.so ../app/

      # 6. Chạy PyInstaller đóng gói ứng dụng
      - name: Package with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --add-data "app/models;models" --add-binary "app/sudoku_solver_cpp*.pyd;." app/main.py
          rename-item dist/main.exe SudokuSolver-Windows.exe
        shell: pwsh

      - name: Package with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --add-data "app/models:models" --add-binary "app/sudoku_solver_cpp*.so:." app/main.py
          mv dist/main dist/SudokuSolver-Linux

      - name: Package with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --add-data "app/models:models" --add-binary "app/sudoku_solver_cpp*.so:." app/main.py
          zip -r SudokuSolver-macOS.zip dist/main.app

      # 7. Lưu vết (Artifacts) tạm thời sản phẩm đầu ra của 3 máy ảo
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-binaries-${{ matrix.os }}
          path: |
            dist/SudokuSolver-Windows.exe
            dist/SudokuSolver-Linux
            SudokuSolver-macOS.zip
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      # 1. Tải toàn bộ sản phẩm của các máy ảo về
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 2. Gom các file vào 1 thư mục chung
      - name: Flatten folder structure
        run: |
          mkdir release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -l release-assets/

      # 3. Tự động tạo bản Release trên GitHub (Có cơ chế tự đặt tag dự phòng khi chạy thủ công)
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          # Nếu chạy bằng thẻ tag, lấy tên tag đó. Nếu chạy thủ công bằng nút bấm, lấy tên dự phòng 'latest-build'
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-build' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Desktop Build' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}